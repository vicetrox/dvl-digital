# Configuración del puerto (¡Diferente al de Pedidos!)
server.port=8082

# Configuración de MySQL (creará la base de datos pagos_db automáticamente)
spring.datasource.url=jdbc:mysql://localhost:3306/pagos_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true